name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Stage 1: Validate — runs automatically on every push
  # ------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm site files exist
        run: |
          test -f index.html || (echo "index.html missing" && exit 1)
          echo "✓ Site files look good"

  # ------------------------------------------------------------------
  # Stage 2: Deploy to production (requires manual approval)
  # ------------------------------------------------------------------
  deploy-production:
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.DO_PORT }}" "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to DigitalOcean
        run: |
          TS=$(date +%Y%m%d%H%M%S)
          REMOTE_RELEASE="${{ secrets.DO_DEPLOY_PATH }}/releases/$TS"
          SSH="ssh -p ${{ secrets.DO_PORT }} ${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}"

          $SSH "mkdir -p $REMOTE_RELEASE"

          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='DEPLOY_DO.md' \
            -e "ssh -p ${{ secrets.DO_PORT }}" \
            ./ "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:$REMOTE_RELEASE/"

          $SSH "ln -sfn $REMOTE_RELEASE ${{ secrets.DO_DEPLOY_PATH }}/current && ls -1dt ${{ secrets.DO_DEPLOY_PATH }}/releases/* | tail -n +8 | xargs -r rm -rf"

          echo "✓ Deployed to /srv/suborbuild/current"
